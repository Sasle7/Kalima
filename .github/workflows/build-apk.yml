name: Build Kalima APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: /home/runner/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Create android platform files
        run: |
          flutter create --platforms android .

          # 1. Fix build.gradle.kts: compileSdk, namespace, applicationId
          echo "=== Fixing app build.gradle.kts ==="
          head -20 android/app/build.gradle.kts
          sed -i 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 36/' android/app/build.gradle.kts
          sed -i 's/targetSdk = flutter\.targetSdkVersion/targetSdk = 36/' android/app/build.gradle.kts
          sed -i 's/minSdk = flutter\.minSdkVersion/minSdk = 21/' android/app/build.gradle.kts
          sed -i 's/namespace = "com\.example\.kalima"/namespace = "com.kalima.app"/' android/app/build.gradle.kts
          sed -i 's/applicationId = "com\.example\.kalima"/applicationId = "com.kalima.app"/' android/app/build.gradle.kts
          echo "After:"
          head -25 android/app/build.gradle.kts

          # 2. Fix AndroidManifest.xml: update package and activity to match namespace
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          echo "=== Fixing AndroidManifest.xml ==="
          cat "$MANIFEST"
          # Update package attribute to match namespace
          sed -i 's/package="com\.example\.kalima"/package="com.kalima.app"/' "$MANIFEST"
          # Ensure activity uses full class name (in case no package attr in newer Flutter)
          sed -i 's|android:name="\.MainActivity"|android:name="com.kalima.app.MainActivity"|' "$MANIFEST"

          # 3. Move MainActivity.kt to correct package directory
          OLD_ACTIVITY="android/app/src/main/kotlin/com/example/kalima/MainActivity.kt"
          NEW_ACTIVITY_DIR="android/app/src/main/kotlin/com/kalima/app"
          if [ -f "$OLD_ACTIVITY" ]; then
            echo "=== Moving MainActivity.kt to new package ==="
            mkdir -p "$NEW_ACTIVITY_DIR"
            sed 's/package com\.example\.kalima/package com.kalima.app/' "$OLD_ACTIVITY" > "$NEW_ACTIVITY_DIR/MainActivity.kt"
            rm "$OLD_ACTIVITY"
            # Remove old empty directory if possible
            rmdir "android/app/src/main/kotlin/com/example/kalima" 2>/dev/null || true
            rmdir "android/app/src/main/kotlin/com/example" 2>/dev/null || true
            echo "New MainActivity.kt:"
            cat "$NEW_ACTIVITY_DIR/MainActivity.kt"
          fi

      - name: Generate app icons from icon.png
        run: |
          if [ -f "icon.png" ]; then
            echo "=== Generating app icons from icon.png ==="
            # Android mipmap icons at standard densities
            convert icon.png -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert icon.png -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert icon.png -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            echo "Icons generated successfully"
          else
            echo "Warning: icon.png not found, using default Flutter icon"
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Patch plugin build.gradle files for AGP 8+ compatibility
        run: |
          echo "=== Bumping compileSdk to 36 in all plugin build.gradle files ==="
          # Find all build.gradle files in pub cache that have compileSdk < 36
          for gradle_file in $(find "$PUB_CACHE/hosted/pub.dev" -name "build.gradle" -path "*/android/*" 2>/dev/null); do
            # Get the current compileSdk value
            current_sdk=$(grep -oP 'compileSdk(?:Version)?\s+(?:\d+)' "$gradle_file" | grep -oP '\d+' | head -1)
            if [ -n "$current_sdk" ] && [ "$current_sdk" -lt 36 ] 2>/dev/null; then
              echo "  Patching $gradle_file (compileSdk=$current_sdk -> 36)"
              sed -i 's/compileSdk [0-9][0-9]/compileSdk 36/' "$gradle_file"
              sed -i 's/compileSdkVersion [0-9][0-9]/compileSdkVersion 36/' "$gradle_file"
              # Also add namespace if missing (for AGP 8+)
              if ! grep -q "namespace" "$gradle_file"; then
                pkg_name=$(basename $(dirname $(dirname "$gradle_file")) | sed 's/-[0-9].*//' | tr '-' '_')
                sed -i 's/^android {/android {\n    namespace = "com.plugin.'"$pkg_name"'"/' "$gradle_file"
                echo "    Added namespace to $gradle_file"
              fi
            fi
          done

          # Special fix: isar_flutter_libs needs its AndroidManifest.xml package attr removed
          ISAR_MANIFEST="$PUB_CACHE/hosted/pub.dev/isar_flutter_libs-3.1.0+1/android/src/main/AndroidManifest.xml"
          if [ -f "$ISAR_MANIFEST" ]; then
            echo "=== Fixing isar_flutter_libs AndroidManifest.xml ==="
            sed -i 's/package="dev.isar.isar_flutter_libs"//' "$ISAR_MANIFEST"
          fi

          echo "=== All patches applied ==="

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Build AppBundle
        run: flutter build appbundle --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kalima-apk
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
