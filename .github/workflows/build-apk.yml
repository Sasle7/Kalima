name: Build Kalima APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: /home/runner/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: /home/runner/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create android platform files
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms android .
          fi
          # Fix: Namespace for AGP 8+ compatibility
          # Add namespace to app/build.gradle.kts if missing
          if ! grep -q "namespace" android/app/build.gradle.kts 2>/dev/null; then
            sed -i 's/android {/android {\n    namespace = "com.kalima.app"/' android/app/build.gradle.kts
          fi
          # Enable namespace migration for library dependencies (isar_flutter_libs)
          echo "android.namespaceMigration=true" >> android/gradle.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Fix isar_flutter_libs namespace for AGP 8+
        run: |
          ISAR_DIR="$PUB_CACHE/hosted/pub.dev/isar_flutter_libs-3.1.0+1"
          if [ -f "$ISAR_DIR/android/build.gradle" ]; then
            echo "Patching isar_flutter_libs namespace..."
            sed -i 's/^android {/android {\n    namespace = "com.isar.flutter_libs"/' "$ISAR_DIR/android/build.gradle"
          else
            echo "isar_flutter_libs not found at $ISAR_DIR, checking alternatives..."
            find "$PUB_CACHE/hosted/pub.dev" -name "isar_flutter_libs*" -type d 2>/dev/null
          fi

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Build AppBundle
        run: flutter build appbundle --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kalima-apk
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
