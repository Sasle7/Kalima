name: Build Kalima APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: /home/runner/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: /home/runner/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create android platform files
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms android .
          fi
          # Override android/app/build.gradle.kts with correct SDK versions
          echo '' | base64 -d > android/app/build.gradle.kts
          echo "Build.gradle.kts written successfully"
          head -5 android/app/build.gradle.kts

      - name: Get dependencies
        run: flutter pub get

      - name: Fix isar_flutter_libs for AGP 8+
        run: |
          ISAR_DIR="$PUB_CACHE/hosted/pub.dev/isar_flutter_libs-3.1.0+1"
          MANIFEST="$ISAR_DIR/android/src/main/AndroidManifest.xml"
          BUILD_GRADLE="$ISAR_DIR/android/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            echo "Adding namespace to isar_flutter_libs build.gradle..."
            sed -i 's/^android {/android {\n    namespace = "com.isar.flutter_libs"/' "$BUILD_GRADLE"
          fi
          if [ -f "$MANIFEST" ]; then
            echo "Removing package attr from isar_flutter_libs AndroidManifest.xml..."
            sed -i 's/package="dev.isar.isar_flutter_libs"//' "$MANIFEST"
          fi

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Build AppBundle
        run: flutter build appbundle --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kalima-apk
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
