name: Build Kalima APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: /home/runner/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Create android platform files
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms android .
          fi
          # Fix compileSdk and targetSdk to 36 (flutter_plugin_android_lifecycle requires 36)
          # flutter.create generates compileSdk = flutter.compileSdkVersion (which is 34)
          echo "Before patching:"
          head -20 android/app/build.gradle.kts
          sed -i 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 36/' android/app/build.gradle.kts
          sed -i 's/targetSdk = flutter\.targetSdkVersion/targetSdk = 36/' android/app/build.gradle.kts
          sed -i 's/minSdk = flutter\.minSdkVersion/minSdk = 21/' android/app/build.gradle.kts
          sed -i 's/namespace = "com\.example\.kalima"/namespace = "com.kalima.app"/' android/app/build.gradle.kts
          sed -i 's/applicationId = "com\.example\.kalima"/applicationId = "com.kalima.app"/' android/app/build.gradle.kts
          echo "After patching:"
          head -25 android/app/build.gradle.kts

      - name: Get dependencies
        run: flutter pub get

      - name: Patch plugin build.gradle files for AGP 8+
        run: |
          # 1. Fix isar_flutter_libs: add namespace + bump compileSdk to 36
          ISAR_DIR="$PUB_CACHE/hosted/pub.dev/isar_flutter_libs-3.1.0+1"
          ISAR_BUILD="$ISAR_DIR/android/build.gradle"
          if [ -f "$ISAR_BUILD" ]; then
            echo "=== Patching isar_flutter_libs ==="
            sed -i 's/^android {/android {\n    namespace = "com.isar.flutter_libs"/' "$ISAR_BUILD"
            echo "  compileSdk line(s): $(grep -n 'compileSdk' "$ISAR_BUILD")"
            sed -i 's/compileSdk [0-9][0-9]/compileSdk 36/' "$ISAR_BUILD"
            sed -i 's/compileSdkVersion [0-9][0-9]/compileSdkVersion 36/' "$ISAR_BUILD"
            echo "  -> after patch: $(grep -n 'compileSdk' "$ISAR_BUILD")"
          fi
          ISAR_MANIFEST="$ISAR_DIR/android/src/main/AndroidManifest.xml"
          if [ -f "$ISAR_MANIFEST" ]; then
            echo "  Removing package attr from AndroidManifest.xml..."
            sed -i 's/package="dev.isar.isar_flutter_libs"//' "$ISAR_MANIFEST"
          fi

          # 2. Fix file_picker: bump compileSdk to 36
          FP_DIR="$PUB_CACHE/hosted/pub.dev/file_picker-8.3.7"
          FP_BUILD="$FP_DIR/android/build.gradle"
          if [ -f "$FP_BUILD" ]; then
            echo "=== Patching file_picker ==="
            echo "  before: $(grep -n 'compileSdk' "$FP_BUILD")"
            sed -i 's/compileSdk [0-9][0-9]/compileSdk 36/' "$FP_BUILD"
            sed -i 's/compileSdkVersion [0-9][0-9]/compileSdkVersion 36/' "$FP_BUILD"
            echo "  after:  $(grep -n 'compileSdk' "$FP_BUILD")"
          fi

          # 3. Disable AAR metadata check in root gradle.properties
          echo "android.disableAarMetadata=true" >> android/gradle.properties
          echo "=== gradle.properties ==="
          grep -v "^#" android/gradle.properties | grep -v "^$"

          # 4. Add disableAarMetadata to app build.gradle.kts as well
          echo "=== Adding disableAarMetadata to app build.gradle.kts ==="
          sed -i '/^android {/a\    disableAarMetadata = true' android/app/build.gradle.kts
          head -10 android/app/build.gradle.kts

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Build AppBundle
        run: flutter build appbundle --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kalima-apk
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
