name: Build Kalima APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter
          key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: /home/runner/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Create android platform files
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms android .
          fi
          # Fix compileSdk and targetSdk to 36 (flutter_plugin_android_lifecycle requires 36)
          # flutter.create generates compileSdk = flutter.compileSdkVersion (which is 34)
          echo "Before patching:"
          head -20 android/app/build.gradle.kts
          sed -i 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 36/' android/app/build.gradle.kts
          sed -i 's/targetSdk = flutter\.targetSdkVersion/targetSdk = 36/' android/app/build.gradle.kts
          sed -i 's/minSdk = flutter\.minSdkVersion/minSdk = 21/' android/app/build.gradle.kts
          sed -i 's/namespace = "com\.example\.kalima"/namespace = "com.kalima.app"/' android/app/build.gradle.kts
          sed -i 's/applicationId = "com\.example\.kalima"/applicationId = "com.kalima.app"/' android/app/build.gradle.kts
          echo "After patching:"
          head -25 android/app/build.gradle.kts

      - name: Get dependencies
        run: flutter pub get

      - name: Patch plugin build.gradle files for AGP 8+
        run: |
          # Fix isar_flutter_libs: add namespace for AGP 8+
          ISAR_DIR="$PUB_CACHE/hosted/pub.dev/isar_flutter_libs-3.1.0+1"
          MANIFEST="$ISAR_DIR/android/src/main/AndroidManifest.xml"
          BUILD_GRADLE="$ISAR_DIR/android/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            echo "Adding namespace to isar_flutter_libs build.gradle..."
            sed -i 's/^android {/android {\n    namespace = "com.isar.flutter_libs"/' "$BUILD_GRADLE"
          fi
          if [ -f "$MANIFEST" ]; then
            echo "Removing package attr from isar_flutter_libs AndroidManifest.xml..."
            sed -i 's/package="dev.isar.isar_flutter_libs"//' "$MANIFEST"
          fi

          # Fix file_picker: bump compileSdk to 36 (flutter_plugin_android_lifecycle requires 36)
          FILE_PICKER_DIR="$PUB_CACHE/hosted/pub.dev/file_picker-8.3.7"
          FP_BUILD_GRADLE="$FILE_PICKER_DIR/android/build.gradle"
          if [ -f "$FP_BUILD_GRADLE" ]; then
            echo "Patching file_picker build.gradle compileSdk -> 36..."
            sed -i 's/compileSdkVersion 34/compileSdkVersion 36/' "$FP_BUILD_GRADLE"
            sed -i 's/compileSdk = 34/compileSdk = 36/' "$FP_BUILD_GRADLE"
            sed -i 's/compileSdk 34/compileSdk 36/' "$FP_BUILD_GRADLE"
            grep -n "compileSdk" "$FP_BUILD_GRADLE"
          else
            echo "Warning: file_picker build.gradle not found at $FP_BUILD_GRADLE"
            ls "$FILE_PICKER_DIR/android/" 2>/dev/null || echo "No android dir found"
          fi

          # Add android.disableAarMetadata=true as safety net
          echo "android.disableAarMetadata=true" >> android/gradle.properties
          echo "gradle.properties now has:"
          grep -i "aar\|compile\|target" android/gradle.properties

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Build AppBundle
        run: flutter build appbundle --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kalima-apk
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
